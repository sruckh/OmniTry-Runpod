# Shared environment configuration for GitHub Actions workflows
# This file defines common environment variables and settings used across workflows

env:
  # Container Registry Configuration
  REGISTRY: docker.io
  REGISTRY_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  
  # Image Configuration
  IMAGE_NAMESPACE: gemneye
  IMAGE_NAME: omnitry-runpod
  
  # Platform Specifications (RunPod Requirements)
  PLATFORMS: linux/amd64
  
  # Build Configuration
  BUILDKIT_PROGRESS: plain
  DOCKER_BUILDKIT: 1
  BUILDX_NO_DEFAULT_ATTESTATIONS: 1
  
  # Security Configuration
  SECURITY_SCAN_ENABLED: true
  TRIVY_CACHE_DIR: /tmp/.trivy
  
  # Performance Configuration
  CACHE_TYPE: gha
  CACHE_MODE: max
  
  # Documentation
  DOCKERHUB_README: ./docs/DOCKERHUB.md
  DOCKERHUB_SHORT_DESCRIPTION: "AI virtual try-on system optimized for RunPod GPU cloud platform"

# Common workflow defaults that can be inherited
defaults:
  run:
    shell: bash